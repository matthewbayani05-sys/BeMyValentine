<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Valentine?</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        font-family: 'Comic Sans MS', cursive, sans-serif;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;

        /* Animated pastel background */
        background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
        background-size: 400% 400%;
        animation: gradientBG 12s ease infinite;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .card {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        color: white;
        max-width: 600px;
        width: 100%;
    }

    h1 {
        font-size: 2.2rem;
        margin-bottom: 30px;
    }

    h2 {
        font-size: 1.8rem;
        margin-bottom: 20px;
    }

    .options label {
        font-size: 1.4rem;
        margin: 10px;
        cursor: pointer;
    }

    input[type="checkbox"] {
        transform: scale(1.5);
        margin-right: 8px;
        cursor: pointer;
    }

    #yesContent {
        display: none;
        text-align: center;
    }

    #yesContent img {
        width: 400px;
        height: 400px;
        border-radius: 10px;
    }

    #noContent {
        display: none;
        text-align: center;
    }

    #noContent img {
        width: 400px;
        height: 400px;
        border-radius: 10px;
    }

    /* Floating hearts */
    .bg-heart {
        position: absolute;
        color: rgba(255,255,255,0.3);
        animation: float 8s linear infinite;
        font-size: 30px;
    }

    @keyframes float {
        0% {
            transform: translateY(100vh);
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh);
            opacity: 0;
        }
    }

    /* Sparkle effect */
    .sparkle {
        position: absolute;
        width: 5px;
        height: 5px;
        background: white;
        border-radius: 50%;
        animation: sparkle 3s infinite ease-in-out;
    }

    @keyframes sparkle {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
    }
</style>
</head>
<body>

<div class="card">
    <h1 id="question">Will You Be My Valentine? 💖</h1>
    <div class="options" id="options">
        <label><input type="checkbox" id="yesOption"> Yes 💕</label>
        <label><input type="checkbox" id="noOption"> No 😢</label>
    </div>

    <div id="yesContent">
        <h2>I LOVE YOU VERY MUCH</h2>
        <img id="yesSlideshow" src="pic1.jpg" alt="Slideshow">
    </div>

    <div id="noContent">
        <img id="noSlideshow" src="pic11.jpg" alt="Slideshow">
    </div>
</div>

<audio id="musicYes">
    <source src="cant_help_falling_in_love.mp3" type="audio/mpeg">
</audio>

<audio id="musicNo">
    <source src="lonely.mp3" type="audio/mpeg">
</audio>

<script>
    const yesOption = document.getElementById("yesOption");
    const noOption = document.getElementById("noOption");
    const musicYes = document.getElementById("musicYes");
    const musicNo = document.getElementById("musicNo");
    const options = document.getElementById("options");
    const question = document.getElementById("question");
    const yesContent = document.getElementById("yesContent");
    const noContent = document.getElementById("noContent");
    const yesSlideshow = document.getElementById("yesSlideshow");
    const noSlideshow = document.getElementById("noSlideshow");

    let yesSlideIndex = 0;
    let noSlideIndex = 0;
    let yesInterval;
    let noInterval;

    const yesImages = [
        "pic1.jpg", "pic2.jpg", "pic3.jpg", "pic4.jpg", "pic5.jpg",
        "pic6.jpg", "pic7.jpg", "pic8.jpg", "pic9.jpg", "pic10.jpg"
    ];

    const noImages = [
        "pic11.jpg", "pic12.jpg", "pic13.jpg", "pic14.jpg", "pic15.jpg",
        "pic16.jpg", "pic17.jpg", "pic18.jpg", "pic19.jpg", "pic20.jpg"
    ];

    function startYesSlideshow() {
        yesInterval = setInterval(() => {
            yesSlideIndex = (yesSlideIndex + 1) % yesImages.length;
            yesSlideshow.src = yesImages[yesSlideIndex];
        }, 3000); // Change image every 3 seconds
    }

    function startNoSlideshow() {
        noInterval = setInterval(() => {
            noSlideIndex = (noSlideIndex + 1) % noImages.length;
            noSlideshow.src = noImages[noSlideIndex];
        }, 3000); // Change image every 3 seconds
    }

    function stopSlideshows() {
        clearInterval(yesInterval);
        clearInterval(noInterval);
    }

    noOption.addEventListener("change", function() {
        if (noOption.checked) {
            options.style.display = "none";
            question.style.display = "none";
            noContent.style.display = "block";
            musicNo.play();
            startNoSlideshow();
        }
    });

    yesOption.addEventListener("change", function() {
        if (yesOption.checked) {
            options.style.display = "none";
            question.style.display = "none";
            yesContent.style.display = "block";
            musicYes.play();
            startYesSlideshow();
            createHearts();
        }
    });

    function createHearts() {
        setInterval(() => {
            const heart = document.createElement("div");
            heart.classList.add("bg-heart");
            heart.innerHTML = "💗";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 30 + 20 + "px";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 8000);
        }, 300);
    }

    // Sparkles generator
    setInterval(() => {
        const sparkle = document.createElement("div");
        sparkle.classList.add("sparkle");
        sparkle.style.left = Math.random() * 100 + "vw";
        sparkle.style.top = Math.random() * 100 + "vh";
        document.body.appendChild(sparkle);

        setTimeout(() => {
            sparkle.remove();
        }, 3000);
    }, 200);
</script>

</body>
</html>
